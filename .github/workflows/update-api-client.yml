name: Update API Client

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-api-client:
    name: Update API Client
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Generate API client
        run: make generate/api-client
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- internal/neon/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          signoff: true
          commit-message: "Update auto-generated API client from OpenAPI spec"
          branch: automated/update-api-client
          title: "Update auto-generated API client from OpenAPI spec"
          body: |
            This PR was automatically created because the [Neon API spec](https://neon.com/api_spec/release/v2.json) has changed.

            Please review the generated changes in `internal/neon/`.

version: "2"

run:
  timeout: 3m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - dupl
    - errcheck
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wrapcheck
  settings:
    funlen:
      lines: 120
      statements: 60
    gocyclo:
      min-complexity: 20
    goconst:
      min-len: 3
      min-occurrences: 3
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - dupl
          - funlen
          - goconst
          - gosec
          - noctx
          - wrapcheck
      - path: internal/neon/
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - goconst
          - gocritic
          - gocyclo
          - godot
          - gosec
          - govet
          - ineffassign
          - misspell
          - nakedret
          - noctx
          - nolintlint
          - revive
          - staticcheck
          - unconvert
          - unparam
          - unused
          - whitespace
          - wrapcheck
